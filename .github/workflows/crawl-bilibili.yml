name: B站数据采集

on:
  schedule:
    - cron: '0 16 * * *'   # UTC 16:00 = 北京时间次日 0:00
  workflow_dispatch:        # 允许手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout data 分支
        uses: actions/checkout@v4
        with:
          ref: data
          # 同时 fetch main 分支的代码
          fetch-depth: 0

      - name: Checkout src 代码（从 main 分支）
        run: |
          git fetch origin main
          git checkout origin/main -- src/ keywords.yaml targets.yaml pyproject.toml

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-bilibili-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-bilibili-

      - name: Install dependencies
        run: pip install bilibili-api-python httpx pyyaml

      - name: Run B站爬虫
        run: python -m src.cli crawl --platform bilibili --mode actions --depth shallow --order pubdate --limit 10
        env:
          BILI_SESSDATA: ${{ secrets.BILI_SESSDATA }}   # 可选，深度功能
          KEYWORDS_FILE: keywords.yaml

      - name: Commit data
        run: |
          git config user.name "slg-sentinel-bot"
          git config user.email "bot@slg-sentinel"
          git add data/
          git diff --staged --quiet || git commit -m "📊 bilibili snapshot $(date +%Y-%m-%d)"
          # pull --rebase 防止并发冲突
          git pull --rebase origin data || true
          git push origin data
